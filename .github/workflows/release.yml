name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: lazyifconfig
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: lazyifconfig
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: lazyifconfig
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: lazyifconfig.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          fi

          package="lazyifconfig-${version}-${{ matrix.target }}"
          mkdir "${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${package}/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${package}.zip" "${package}"
          else
            tar -czf "${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyifconfig-${{ matrix.target }}
          path: |
            lazyifconfig-*.tar.gz
            lazyifconfig-*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
